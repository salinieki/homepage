baseURL = "https://salinieki.co.uk/"
defaultContentLanguage = "lv"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
enableEmoji = false
summaryLength = 40
disableKinds = ["taxonomy", "term"]

[languages]
  [languages.lv]
    label = "Latviski"
    locale = "lv"
    weight = 1
    title = 'Londonas TDK "Salinieki"'
    [languages.lv.params]
      description = "Londonas Tautas Deju Kopa Salinieki — latviešu tautas deju kolektīvs Londonā kopš 2012. gada."
      flag = "images/flags/lv.svg"
      flagAlt = "Latviski"
    [[languages.lv.params.calendar]]
      date = "07.09.2026"
      title = "Jaunās sezonas sākums"
    [[languages.lv.params.calendar]]
      date = "20.02.2027"
      title = "\"Dejo ar Mani\" Aberdīnā"
    [[languages.lv.params.calendar]]
      date = "01.05.2027"
      title = "11. Kultūras Diena Edinburgā"
    [languages.lv.menu]
      [[languages.lv.menu.main]]
        name = "Aktualitātes"
        url = "/"
        weight = 10
      [[languages.lv.menu.main]]
        name = "Foto"
        url = "/foto/"
        weight = 20
      [[languages.lv.menu.main]]
        name = "Video"
        url = "/video/"
        weight = 30
      [[languages.lv.menu.main]]
        name = "Par mums"
        url = "/par-mums/"
        weight = 40
      [[languages.lv.menu.main]]
        name = "Kontakti"
        url = "/kontakti/"
        weight = 50

  [languages.en]
    label = "English"
    locale = "en"
    weight = 2
    title = 'Salinieki – Latvian Folk Dance Group in London'
    [languages.en.params]
      description = "Salinieki is a Latvian folk dance group based in London, performing since 2012."
      flag = "images/flags/gb.svg"
      flagAlt = "English"
    [[languages.en.params.calendar]]
      date = "07.09.2026"
      title = "Start of the new season"
    [[languages.en.params.calendar]]
      date = "20.02.2027"
      title = "\"Dejo ar Mani\" in Aberdeen"
    [[languages.en.params.calendar]]
      date = "01.05.2027"
      title = "11. Latvian Culture Day in Edinburgh"
    [languages.en.menu]
      [[languages.en.menu.main]]
        name = "News"
        url = "/en/"
        weight = 10
      [[languages.en.menu.main]]
        name = "Photos"
        url = "/en/photos/"
        weight = 20
      [[languages.en.menu.main]]
        name = "Videos"
        url = "/en/videos/"
        weight = 30
      [[languages.en.menu.main]]
        name = "About us"
        url = "/en/about/"
        weight = 40
      [[languages.en.menu.main]]
        name = "Contact"
        url = "/en/contact/"
        weight = 50

