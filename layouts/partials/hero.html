{{ $slides := .Site.Params.heroSlides }}
{{ $slideSeconds := 6 }}
<section class="hero" data-slide-interval="{{ mul $slideSeconds 1000 }}">
  <div class="hero-slides" aria-hidden="true">
    {{ range $i, $s := $slides }}
      {{ $url := "" }}
      {{ with resources.Get $s.image }}
        {{ $url = .RelPermalink }}
      {{ else }}
        {{ $url = $s.image | relURL }}
      {{ end }}
      <div class="hero-slide{{ if eq $i 0 }} is-active{{ end }}" style="background-image: linear-gradient(rgba(4,35,71,0.45), rgba(4,35,71,0.65)), url('{{ $url }}');"></div>
    {{ end }}
  </div>
  <div class="container hero-inner">
    <h1 class="hero-heading">
      <span class="hero-eyebrow">{{ i18n "hero_eyebrow" }}</span>
      <span class="hero-title">Salinieki</span>
    </h1>
  </div>
</section>
