<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {{ if hugo.IsProduction }}
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=GT-P3H9P3B9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'GT-P3H9P3B9');
  </script>
  <!-- Simple Analytics -->
  <script src="https://scripts.simpleanalyticscdn.com/latest.js" data-collect-dnt="true" async></script>
  {{ end }}
  <title>{{ if not .IsHome }}{{ .Title }} – {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="icon" type="image/png" href="{{ "images/logo.png" | relURL }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox@3/dist/css/glightbox.min.css">
  <script src="{{ "js/site.js" | relURL }}" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/glightbox@3/dist/js/glightbox.min.js" defer></script>
</head>
<body class="{{ if .IsHome }}is-home{{ else }}is-page{{ end }}">
  {{ partial "header.html" . }}
  <main class="site-main">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      if (window.GLightbox) { GLightbox({ selector: '.glightbox' }); }
    });
  </script>
</body>
</html>
